services:
  recovery-portal:
    image: ghcr.io/dofot9/recovery-portal:latest
    # Or build locally: `docker compose build`
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recovery-portal
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    # Environment variables — all OPTIONAL.
    # The entrypoint auto-generates AUTH_SECRET and TOTP_ENCRYPTION_KEY on
    # first start and persists them to /data/secrets.env. Set them here only
    # if you want explicit control (shared secrets across replicas, secret
    # manager integration, etc).
    environment:
      DATA_DIR: /data
      NODE_ENV: production
      # AUTH_SECRET: <32-byte hex>             # optional, auto-generated
      # TOTP_ENCRYPTION_KEY: <32-byte hex>     # optional, auto-generated
      # COOKIE_SECURE: "true"                  # set when serving over HTTPS
      # VAPID_PUBLIC_KEY: <key>                # optional, for Web Push
      # VAPID_PRIVATE_KEY: <key>
      # VAPID_SUBJECT: mailto:admin@example.com
    # Uncomment to provide env vars from a file instead:
    # env_file:
    #   - .env.local
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
